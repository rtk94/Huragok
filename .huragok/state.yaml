# Huragok — Orchestrator State
#
# This file is owned by the orchestrator daemon. Agents inside a Claude
# Code session may READ it to know where they are in the batch; the
# orchestrator is the only component that WRITES it.
#
# The values below represent the "idle, no batch in flight" state and
# validate cleanly against the Slice A schemas. When `huragok run`
# launches a batch, the Supervisor overwrites this file with live state.
#
# Schema: orchestrator.state.schemas.StateFile (ADR-0002 D3)

version: 1
phase: idle
batch_id: null
current_task: null
current_agent: null
session_count: 0
session_id: null
started_at: null
last_checkpoint: null
halted_reason: null
budget_consumed:
  wall_clock_seconds: 0
  tokens_input: 0
  tokens_output: 0
  tokens_cache_read: 0
  tokens_cache_write: 0
  dollars: 0.0
  iterations: 0
session_budget:
  remaining_tokens: null
  remaining_dollars: null
  timeout_seconds: null
pending_notifications: []
awaiting_reply:
  notification_id: null
  sent_at: null
  kind: null
  deadline: null
